<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Youngs Capital — iOS App</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --green: #4a8c3f;
      --blue: #1a4b8c;
      --dark: #07080d;
      --dark-2: #0d0f18;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #e8e8ec;
      --muted: #6a6a7a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background atmosphere */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(26,75,140,0.18) 0%, transparent 70%);
      border-radius: 50%;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(74,140,63,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* Subtle grid */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 3rem 3.5rem 2.5rem;
      max-width: 440px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Company logo */
    .company-logo {
      display: block;
      height: 72px;
      width: auto;
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.6s 0.1s both;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.6s 0.2s both;
    }

    /* Platform icon */
    .platform-icon-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.6s 0.3s both;
    }
    .platform-icon-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .platform-icon-wrap img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      position: relative;
      z-index: 1;
    }
    /* Glow ring */
    .platform-icon-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 32px;
      border: 1px solid rgba(201,168,76,0.15);
      animation: ringPulse 2.5s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.04); }
    }

    /* Heading */
    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #fff;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.6s 0.35s both;
    }
    .heading span {
      color: var(--gold-light);
    }

    /* Subtitle */
    .subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.4s both;
    }

    /* Progress */
    .progress-wrap {
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.45s both;
    }
    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--gold));
      border-radius: 99px;
      animation: progressFill 2.5s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
    }
    @keyframes progressFill {
      to { width: 100%; }
    }

    /* Status */
    .status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.7rem;
      letter-spacing: 0.04em;
      min-height: 1.2em;
      animation: fadeUp 0.6s 0.5s both;
    }

    .error-msg {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      display: none;
      animation: fadeUp 0.3s both;
    }

    .retry-btn {
      display: none;
      margin-top: 1.2rem;
      padding: 0.65rem 1.8rem;
      background: transparent;
      color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }
    .retry-btn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }

    /* Footer */
    .card-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.55s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Dots loader */
    .dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      margin-top: 0.5rem;
    }
    .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%,80%,100% { opacity: 0.2; transform: scale(0.7); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

      document.getElementById("msg").innerHTML = text;

    function redirect() {
      document.getElementById("err").style.display = "none";
      document.getElementById("retryBtn").style.display = "none";
      setMsg('Fetching latest link from server&hellip;<div class="dots"><span></span><span></span><span></span></div>');
